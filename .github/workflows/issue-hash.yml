name: Hash Stack Traces
on:
  issues:
    types: [opened, edited]
jobs:
  hash-stack:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // --- NEW: Fast Short-Circuit using Labels ---
            const labels = context.payload.issue.labels || [];
            const hasLabel = labels.some(label => label.name === 'has-stack-trace');
            if (hasLabel) {
              return; // Stop immediately, we've already processed this!
            }
            // --------------------------------------------

            const body = context.payload.issue.body;
            if (!body) return;
            
            const lines = body.split(/\r?\n/);
            let normalizedLines = [];
            const marker = "[stack-trace-hash:";
            
            if (body.indexOf(marker) !== -1) return;

            for (let line of lines) {
              const trimmed = line.trim();
              if (trimmed.startsWith('Exception: ')) {
                // Extract type name, handle both "Exception: Type" and "Exception: Type: Message"
                const match = trimmed.match(/^Exception:\s+([^\s:]+)/);
                if (match) {
                  normalizedLines.push(match[1]);
                }
              } else if (trimmed.startsWith('at Greenshot.') || trimmed.startsWith('at Dapplo.')) {
                // Normalize stack line by removing file/line info
                const normalizedLine = trimmed.replace(/\s+in\s+.*:line\s+\d+/g, '');
                normalizedLines.push(normalizedLine);
              }
            }
            
            if (normalizedLines.length > 0) {
              const crypto = require('crypto');
              const normalizedText = normalizedLines.join('\n').trim();
              const hash = crypto.createHash('sha256').update(normalizedText).digest('hex').substring(0, 12);
              
              const searchQuery = 'repo:' + context.repo.owner + '/' + context.repo.repo + ' is:issue "' + marker + ' ' + hash + ']"';
              const searchResult = await github.rest.search.issuesAndPullRequests({ q: searchQuery });
              const duplicates = searchResult.data.items.filter(i => i.number !== context.payload.issue.number);
              
              const newBody = body + "\n\n---\n**Stack Trace Hash:** [" + hash + "]";
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: newBody
              });
              
              let labelsToAdd = ['has-stack-trace'];
              
              if (duplicates.length > 0) {
                labelsToAdd.push('possible-duplicate');
                
                const duplicateNumbers = duplicates.map(i => '#' + i.number).join(', ');
                const commentText = "🤖 **Automated Triage:** We found other issues with this exact same stack trace! You might want to check these out to see if there is already a fix or workaround: " + duplicateNumbers;
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: commentText
                });
              }
              
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labelsToAdd
              });
            }
